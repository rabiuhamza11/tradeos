name: TradeOS CI/CD

on:
  push: { branches: [main, master] }
  pull_request: { branches: [main, master] }

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env: { POSTGRES_USER: test, POSTGRES_PASSWORD: test, POSTGRES_DB: tradeos_test }
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm install --legacy-peer-deps
      - run: npx prisma generate --schema=prisma/schema.prisma
        env: { DATABASE_URL: postgresql://test:test@localhost:5432/tradeos_test }
      - run: npx prisma db push --schema=prisma/schema.prisma
        env: { DATABASE_URL: postgresql://test:test@localhost:5432/tradeos_test }
      - run: npm test
        env: { DATABASE_URL: postgresql://test:test@localhost:5432/tradeos_test, JWT_SECRET: test-secret }

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm install --legacy-peer-deps
      - run: npx prisma generate --schema=prisma/schema.prisma
        env: { DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy }
      - name: Build all packages (skip desktop — electron-builder needs GUI)
        run: npx turbo run build --filter=!@tradeos/desktop

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy Web to Vercel
        run: |
          cd apps/web
          npm i -g vercel@latest
          vercel --prod --yes --token ${{ secrets.VERCEL_TOKEN }} --cwd . 2>&1 || true
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Deploy API to Render
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
      - name: Build & Push Docker Images
        continue-on-error: true
        run: |
          docker build -f docker/Dockerfile -t tradeos/api:latest . || true
          docker build -f docker/Dockerfile.web -t tradeos/web:latest . || true
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin || true
          docker push tradeos/api:latest || true
          docker push tradeos/web:latest || true
