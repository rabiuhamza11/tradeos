apiVersion: apps/v1
kind: Deployment
metadata:
  name: tradeos-api
  labels: { app: tradeos, component: api }
spec:
  replicas: 3
  selector: { matchLabels: { app: tradeos, component: api } }
  template:
    metadata: { labels: { app: tradeos, component: api } }
    spec:
      containers:
      - name: api
        image: tradeos/api:latest
        ports: [{ containerPort: 4000 }]
        env:
        - name: DATABASE_URL
          valueFrom: { secretKeyRef: { name: tradeos-secrets, key: database-url } }
        - name: JWT_SECRET
          valueFrom: { secretKeyRef: { name: tradeos-secrets, key: jwt-secret } }
        - name: REDIS_URL
          value: "redis://redis-service:6379"
        resources:
          requests: { memory: "256Mi", cpu: "250m" }
          limits: { memory: "512Mi", cpu: "500m" }
        livenessProbe:
          httpGet: { path: "/api/v1/health", port: 4000 }
          initialDelaySeconds: 30
---
apiVersion: v1
kind: Service
metadata: { name: tradeos-api-service }
spec:
  selector: { app: tradeos, component: api }
  ports: [{ port: 80, targetPort: 4000 }]
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tradeos-web
  labels: { app: tradeos, component: web }
spec:
  replicas: 2
  selector: { matchLabels: { app: tradeos, component: web } }
  template:
    metadata: { labels: { app: tradeos, component: web } }
    spec:
      containers:
      - name: web
        image: tradeos/web:latest
        ports: [{ containerPort: 3000 }]
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "http://tradeos-api-service/api/v1"
        resources:
          requests: { memory: "128Mi", cpu: "100m" }
          limits: { memory: "256Mi", cpu: "250m" }
---
apiVersion: v1
kind: Service
metadata: { name: tradeos-web-service }
spec:
  selector: { app: tradeos, component: web }
  ports: [{ port: 80, targetPort: 3000 }]
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: tradeos-api-hpa }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: tradeos-api }
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
