version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: tradeos
      POSTGRES_PASSWORD: tradeos_secret
      POSTGRES_DB: tradeos_db
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U tradeos"], interval: 5s, timeout: 5s, retries: 5 }

  redis:
    image: redis:7-alpine
    restart: always
    ports: ["6379:6379"]

  api:
    build: { context: .., dockerfile: docker/Dockerfile }
    restart: always
    depends_on: { postgres: { condition: service_healthy } }
    environment:
      DATABASE_URL: postgresql://tradeos:tradeos_secret@postgres:5432/tradeos_db
      JWT_SECRET: ${JWT_SECRET:-change-me}
      PORT: 4000
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports: ["4000:4000"]

  web:
    build: { context: .., dockerfile: docker/Dockerfile.web }
    restart: always
    depends_on: [api]
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    ports: ["3000:3000"]

volumes:
  postgres_data:
